<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Location</title>
  <style>
    :root {
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.68);
      --faint: rgba(255, 255, 255, 0.18);
      --shadow: rgba(0, 0, 0, 0.5);
      --accent: #8aa0ff;
      --bg-image: url("https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?auto=format&fit=crop&w=2400&q=85");
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.5)),
        var(--bg-image) center / cover no-repeat,
        #000;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1.5rem, 5vw, 5rem);
    }

    .location {
      text-align: center;
      max-width: min(92vw, 60rem);
      transform: translateY(-1rem);
      text-shadow: 0 1rem 3rem var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      max-width: min(90vw, 48rem);
      color: var(--muted);
      font-size: clamp(1rem, 2.1vw, 1.7rem);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .eyebrow.hidden { display: none; }

    .pin {
      width: 1.1em;
      height: 1.1em;
      opacity: 0.85;
      transform: translateY(-0.04em);
    }

    .area {
      margin-top: clamp(0.9rem, 2vw, 1.6rem);
      font-size: clamp(3rem, 9vw, 8rem);
      line-height: 1.02;
      font-weight: 760;
      letter-spacing: -0.045em;
      /* Fade the text in on each change; see swapArea(). */
      transition: opacity 320ms ease;
    }

    .area.fading { opacity: 0; }

    .area.waiting {
      color: var(--muted);
      font-weight: 640;
      letter-spacing: -0.03em;
    }

    .updated {
      margin-top: clamp(1.4rem, 3vw, 2.6rem);
      color: var(--muted);
      font-size: clamp(0.85rem, 1.5vw, 1.1rem);
      letter-spacing: 0.02em;
      opacity: 0.85;
      min-height: 1em;
    }

    .updated.stale { color: #ffcf9c; }

    .controls {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      opacity: 0.55;
      transition: opacity 180ms ease;
    }

    .controls:hover { opacity: 1; }

    .icon-btn {
      display: grid;
      place-items: center;
      width: 2.35rem;
      height: 2.35rem;
      color: var(--text);
      background: rgba(12, 12, 14, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      backdrop-filter: blur(14px);
      font: inherit;
      cursor: pointer;
    }

    .icon-btn:hover { background: rgba(255, 255, 255, 0.18); }

    .icon-btn svg { width: 1.05rem; height: 1.05rem; }

    .hide-ui .controls {
      opacity: 0;
      pointer-events: none;
    }

    /* Ask-for-your-name overlay */
    .name-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .name-backdrop.open { display: grid; }

    .name-card {
      width: min(90vw, 24rem);
      padding: 1.9rem;
      border-radius: 1.4rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(12, 14, 18, 0.94);
      box-shadow: 0 2rem 7rem rgba(0, 0, 0, 0.6);
      text-align: center;
    }

    .name-card h2 {
      margin: 0 0 0.4rem;
      font-size: 1.45rem;
      letter-spacing: -0.02em;
    }

    .name-card p {
      margin: 0 0 1.2rem;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .name-card input {
      width: 100%;
      padding: 0.72rem 0.9rem;
      border-radius: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font: inherit;
      font-size: 1.05rem;
      text-align: center;
    }

    .name-card input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .name-card button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #0b1020;
      font: inherit;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
    }

    .name-card button:hover { background: #a3b4ff; }
  </style>
</head>
<body>
  <main class="stage">
    <section class="location" aria-live="polite">
      <div class="eyebrow hidden" id="eyebrow">
        <svg class="pin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 21s-6-5.2-6-10a6 6 0 1 1 12 0c0 4.8-6 10-6 10Z" stroke="currentColor" stroke-width="1.7"/>
          <circle cx="12" cy="11" r="2.1" stroke="currentColor" stroke-width="1.7"/>
        </svg>
        <span id="phrase"></span>
      </div>
      <div class="area waiting" id="area">Waiting for location…</div>
      <div class="updated" id="updated"></div>
    </section>
  </main>

  <div class="controls">
    <button class="icon-btn" id="nameBtn" type="button" title="Change name" aria-label="Change name">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="8" r="3.4" stroke="currentColor" stroke-width="1.8"/>
        <path d="M5.5 19.5a6.5 6.5 0 0 1 13 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="icon-btn" id="fullscreenBtn" type="button" title="Toggle fullscreen" aria-label="Toggle fullscreen">
      <svg id="expandIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg id="collapseIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none">
        <path d="M4 9h5V4M20 9h-5V4M4 15h5v5M20 15h-5v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="name-backdrop" id="nameBackdrop">
    <form class="name-card" id="nameForm">
      <h2>What's your name?</h2>
      <p>The display will use it to narrate where you are.</p>
      <input type="text" id="nameInput" placeholder="e.g. Omar" spellcheck="false" autocomplete="off" maxlength="24" />
      <button type="submit">Start tracking</button>
    </form>
  </div>

  <script>
    const els = {
      area: document.getElementById("area"),
      updated: document.getElementById("updated"),
      eyebrow: document.getElementById("eyebrow"),
      phrase: document.getElementById("phrase"),
      fullscreenBtn: document.getElementById("fullscreenBtn"),
      expandIcon: document.getElementById("expandIcon"),
      collapseIcon: document.getElementById("collapseIcon"),
      nameBtn: document.getElementById("nameBtn"),
      nameBackdrop: document.getElementById("nameBackdrop"),
      nameForm: document.getElementById("nameForm"),
      nameInput: document.getElementById("nameInput")
    };

    // Whose location this is. Remembered in the browser so you only enter it
    // once; ?name=Omar in the URL sets it too. Empty until you pick one.
    const NAME_KEY = "locationDisplayName";
    function loadName() {
      const fromUrl = new URLSearchParams(location.search).get("name");
      if (fromUrl) {
        localStorage.setItem(NAME_KEY, fromUrl);
        return fromUrl;
      }
      return localStorage.getItem(NAME_KEY) || "";
    }
    let userName = loadName();

    // The comedy. One of these is picked per place and kept until you move,
    // so it reads like "Omar is eating ice cream at Syracuse University".
    const ACTIVITIES = [
      "wandering about",
      "eating ice cream",
      "taking a nap",
      "sipping coffee",
      "pretending to work",
      "plotting world domination",
      "touching grass",
      "living their best life",
      "definitely not lost",
      "avoiding responsibilities",
      "causing a scene",
      "up to something",
      "on an adventure",
      "vibing",
      "getting snacks",
      "hiding from emails",
      "doing very important things",
      "lurking",
      "recharging",
      "making questionable decisions"
    ];

    function randomActivity(previous) {
      let pick;
      do {
        pick = ACTIVITIES[Math.floor(Math.random() * ACTIVITIES.length)];
      } while (ACTIVITIES.length > 1 && pick === previous);
      return pick;
    }

    // Keep the current quip stable while at the same place; roll a new one each
    // time the area changes.
    const phraseState = { area: null, activity: null };

    // When the server runs behind a secret (a public web host), this page is
    // opened as .../?token=YOURSECRET. Read that token and send it with every
    // request. A #token=... hash works too, in case you'd rather it not sit in
    // the query string. On a home LAN with no secret set, this is just empty.
    const TOKEN = (() => {
      const fromQuery = new URLSearchParams(location.search).get("token");
      if (fromQuery) return fromQuery;
      const hash = location.hash;
      return hash.startsWith("#token=") ? decodeURIComponent(hash.slice(7)) : "";
    })();

    // Last values we rendered, so we only touch the DOM (and trigger the
    // cross-fade) when something actually changed.
    const shown = { area: null, timestamp: null };

    function swapArea(text, waiting) {
      if (text === shown.area) {
        els.area.classList.toggle("waiting", waiting);
        return;
      }
      shown.area = text;
      els.area.classList.add("fading");
      setTimeout(() => {
        els.area.textContent = text;
        els.area.classList.toggle("waiting", waiting);
        els.area.classList.remove("fading");
      }, 200);
    }

    function relativeTime(seconds) {
      if (seconds < 2) return "Updated just now";
      if (seconds < 60) return `Updated ${Math.round(seconds)} seconds ago`;
      const mins = Math.round(seconds / 60);
      if (mins < 60) return `Updated ${mins} minute${mins === 1 ? "" : "s"} ago`;
      const hrs = Math.round(mins / 60);
      return `Updated ${hrs} hour${hrs === 1 ? "" : "s"} ago`;
    }

    // Cache the latest fix so the "updated N seconds ago" line keeps ticking
    // between polls. We track whether a fix has arrived (received) separately
    // from whether it resolved to an area, so we never fall back to showing
    // raw coordinates: the display only ever names an area. authError is set
    // when the server rejects our token.
    const latest = { area: null, received: false, timestamp: null, authError: false };

    function renderUpdated() {
      if (latest.timestamp == null) {
        els.updated.textContent = "";
        els.updated.classList.remove("stale");
        return;
      }
      const seconds = Math.max(0, Date.now() / 1000 - latest.timestamp);
      els.updated.textContent = relativeTime(seconds);
      // A fix older than a couple of minutes means the Shortcut hasn't run
      // recently, so warm the note to show the position may be stale.
      els.updated.classList.toggle("stale", seconds > 120);
    }

    function setPhrase(text) {
      if (!text) {
        els.eyebrow.classList.add("hidden");
        els.phrase.textContent = "";
        return;
      }
      els.phrase.textContent = text;
      els.eyebrow.classList.remove("hidden");
    }

    function render() {
      const who = userName || "Someone";

      if (latest.authError) {
        // The server has a secret set and we don't have the right token.
        setPhrase("");
        swapArea("Locked", true);
        els.updated.textContent = "Open this page with ?token=YOUR_SECRET";
        els.updated.classList.remove("stale");
        return;
      }
      if (latest.area) {
        // Roll a fresh quip whenever the place changes; keep it otherwise, so
        // it reads like "Omar is eating ice cream at Syracuse University".
        if (phraseState.area !== latest.area) {
          phraseState.area = latest.area;
          phraseState.activity = randomActivity(phraseState.activity);
        }
        setPhrase(`${who} is ${phraseState.activity} at`);
        swapArea(latest.area, false);
      } else if (latest.received) {
        // A fix arrived but hasn't resolved to an area yet (geocoding pending
        // or briefly unavailable). Never reveal coordinates as a stand-in.
        phraseState.area = null;
        setPhrase("");
        swapArea(`Pinning down ${who}…`, true);
      } else {
        phraseState.area = null;
        setPhrase("");
        swapArea(`Looking for ${who}…`, true);
      }
      renderUpdated();
    }

    async function poll() {
      try {
        // Send the token as a header so it stays out of the request URL (and
        // any server access log). Empty when there's no secret.
        const res = await fetch("/latest", {
          cache: "no-store",
          headers: TOKEN ? { "X-Token": TOKEN } : {}
        });
        if (res.status === 401) {
          latest.authError = true;
          render();
          return;
        }
        if (!res.ok) throw new Error();
        const data = await res.json();
        latest.authError = false;
        latest.area = data.area || null;
        latest.received = typeof data.timestamp === "number";
        latest.timestamp = typeof data.timestamp === "number" ? data.timestamp : null;
        render();
      } catch {
        // Keep showing the last known area; renderUpdated() will let the
        // timestamp age so it's clear the feed went quiet.
        renderUpdated();
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
        document.body.classList.add("hide-ui");
      } else {
        document.exitFullscreen?.();
        document.body.classList.remove("hide-ui");
      }
    }

    function syncFullscreenIcon() {
      const fs = Boolean(document.fullscreenElement);
      els.expandIcon.style.display = fs ? "none" : "";
      els.collapseIcon.style.display = fs ? "" : "none";
    }

    /* ---------- Name overlay ---------- */

    function openNamePrompt() {
      els.nameInput.value = userName;
      els.nameBackdrop.classList.add("open");
      els.nameInput.focus();
      els.nameInput.select();
    }

    function closeNamePrompt() {
      els.nameBackdrop.classList.remove("open");
    }

    function saveName(event) {
      event.preventDefault();
      const value = els.nameInput.value.trim();
      if (!value) {
        els.nameInput.focus();
        return;
      }
      userName = value;
      localStorage.setItem(NAME_KEY, value);
      // Force the phrase to rebuild with the new name on the next render.
      phraseState.area = null;
      closeNamePrompt();
      render();
    }

    els.nameForm.addEventListener("submit", saveName);
    els.nameBtn.addEventListener("click", openNamePrompt);
    els.nameBackdrop.addEventListener("click", event => {
      // Click outside the card to dismiss, but only once a name is set.
      if (event.target === els.nameBackdrop && userName) closeNamePrompt();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && userName) closeNamePrompt();
    });

    els.fullscreenBtn.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", syncFullscreenIcon);

    let hideTimer;
    window.addEventListener("mousemove", () => {
      document.body.classList.remove("hide-ui");
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => document.body.classList.add("hide-ui"), 3000);
    });

    // Ask for a name on first visit; after that it's remembered.
    if (!userName) openNamePrompt();

    render();
    poll();
    // Spec: poll /latest every second. render() also runs each tick so the
    // "updated N seconds ago" line stays live even when the fix doesn't change.
    setInterval(poll, 1000);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) poll();
    });
  </script>
</body>
</html>
